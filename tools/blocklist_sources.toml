# CloakDNS blocklist sources. Edit to add / remove / reorder.
#
# format:
#   "hosts"   — lines like `0.0.0.0 domain.tld`
#   "adblock" — EasyList `||domain^` network rules only
#   "plain"   — one domain per line

[[source]]
name   = "stevenblack"
url    = "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
format = "hosts"

[[source]]
name   = "oisd"
url    = "https://big.oisd.nl/"
format = "hosts"

[[source]]
name   = "easyprivacy"
url    = "https://easylist.to/easylist/easyprivacy.txt"
format = "adblock"

[[source]]
name   = "easylist"
url    = "https://easylist.to/easylist/easylist.txt"
format = "adblock"

[[source]]
name   = "peter_lowe"
url    = "https://pgl.yoyo.org/adservers/serverlist.php?hostformat=hosts&showintro=0&mimetype=plaintext"
format = "hosts"

[[source]]
name   = "nextdns_cname"
url    = "https://raw.githubusercontent.com/nextdns/cname-cloaking-blocklist/master/domains"
format = "plain"

# --- Optional aggregator feeds (reasonably well-vetted, lower
# false-positive risk than the larger "ultimate" lists). Comment out
# any whose policy you don't agree with.

