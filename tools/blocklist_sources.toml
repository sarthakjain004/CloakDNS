# CloakDNS blocklist sources — Pi-hole + Firebog parity setup.
#
# A fresh Pi-hole install ships with exactly one adlist
# (StevenBlack/hosts). Most Pi-hole users add the Firebog "ticked"
# lists on top — those are the green-checkmark entries on
# https://firebog.net , maintained by WaLLy3K, which the Pi-hole
# community treats as the canonical curated set. We mirror that
# exact set here so a `python tools/update_blocklists.py` produces
# the same merged.txt a Pi-hole + Firebog-ticked install would.
#
# All Firebog entries are marked `optional = true` so users who
# only want the Pi-hole default behaviour (StevenBlack alone) can
# disable them with a single edit; defaults are required.
#
# format:
#   "hosts"   — lines like `0.0.0.0 domain.tld`
#   "adblock" — EasyList `||domain^` network rules only
#   "plain"   — one domain per line

# ============================================================
# Pi-hole's single default adlist
# ============================================================

[[source]]
name   = "stevenblack"
url    = "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
format = "hosts"

# ============================================================
# Firebog "ticked" — Suspicious Lists
# (https://firebog.net , green-checkmark entries)
# ============================================================

[[source]]
name   = "firebog_kadhosts"
url    = "https://raw.githubusercontent.com/PolishFiltersTeam/KADhosts/master/KADhosts.txt"
format = "hosts"
optional = true

[[source]]
name   = "firebog_fademind_spam"
url    = "https://raw.githubusercontent.com/FadeMind/hosts.extras/master/add.Spam/hosts"
format = "hosts"
optional = true

[[source]]
