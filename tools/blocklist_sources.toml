# ============================================================
# Firebog "ticked" — Other (cryptominers etc)
# ============================================================

# zerodot1 CoinBlockerLists removed 2026-04: the GitLab Pages host
# now requires authentication, so the URL Firebog references returns
# 403 to anonymous fetches. Re-add when upstream restores public
# access.

# ============================================================
# Removed (not part of Pi-hole's default OR Firebog's ticked set):
#   - oisd                        (Firebog has it but unticked by default)
#   - hagezi_light                (Hagezi is upstream-of-OISD; unticked)
#   - 1hosts_lite                 (1Hosts variants are unticked)
#   - nextdns_cname               (NextDNS-specific feed)
#   - ublock_cname_cloaking       (AdGuardTeam feed; not in Firebog)
#   - adguard_sdn_filter          (AdGuard public DNS filter)
#   - someonewhocares             (notoriously aggressive; not in Firebog)
#   - disconnect_simple_tracking  (browser-format, parser-incompatible)
# Each can be re-enabled by uncommenting and adding `optional = true`.
# This file now mirrors exactly what `pihole -g` against Firebog-tick
# would build.
