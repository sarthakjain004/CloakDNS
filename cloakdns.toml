# CloakDNS configuration. See include/cloakdns/config.hpp for the full schema.
# All sections are optional; omitted fields get documented defaults.

[server]
listen_addr = "127.0.0.1"
listen_port = 5354

[upstream]
servers            = ["1.1.1.1:53", "9.9.9.9:53"]
timeout_ms         = 2000
retries_on_primary = 1
padding_block_size = 128      # RFC 8467; 0 disables

[blocklist]
# Static, research-cited tiers ship in the repo under blocklists/ and
# tools/priority_tiers/. The fetched aggregate (run
# `python tools/update_blocklists.py`) writes blocklists/merged.txt
# from StevenBlack / OISD / EasyList / EasyPrivacy / Peter Lowe /
# NextDNS-CNAME and any optional feeds enabled in
# tools/blocklist_sources.toml. Add `blocklists/merged.txt` here
# after running the updater.
# Uncategorized core list(s). Blocks from these carry no `category` in
# the query log. Add "blocklists/merged.txt" here after running the updater.
sources = [
    "blocklists/tier1.txt",
    # "blocklists/merged.txt",   # uncomment after update_blocklists.py runs
]

# Named research tiers. Each tier's domains are loaded tagged with its
# `name`, so a block is attributed to it in the query log
# (`"category":"<name>"`) — which a flat list can't do. See
# docs/research-roadmap.md for the paper backing each tier.
[[blocklist.tier]]
name    = "fingerprinting"
sources = ["tools/priority_tiers/fingerprinting.txt"]

[[blocklist.tier]]
name    = "cname-cloaking"
sources = ["tools/priority_tiers/cname_cloaking.txt"]

[[blocklist.tier]]
name    = "data-broker"
sources = ["tools/priority_tiers/data_brokers.txt"]

[[blocklist.tier]]
name    = "syncing-hub"
sources = ["tools/priority_tiers/cookie_syncing.txt"]

[[blocklist.tier]]
name    = "email-tracking"
sources = ["tools/priority_tiers/email_tracking.txt"]

[[blocklist.tier]]
name    = "server-side-endpoint"
sources = ["tools/priority_tiers/server_side_apis.txt"]

[[blocklist.tier]]
name    = "evercookie"
sources = ["tools/priority_tiers/evercookies.txt"]

[[blocklist.tier]]
name    = "extension-exfil"
sources = ["tools/priority_tiers/extension_exfiltration.txt"]

# [[blocklist.tier]]   # opt-in: may break smart devices
# name    = "smart-device"
# sources = ["tools/priority_tiers/smart_device_telemetry.txt"]

# Optional. Domains in any of these files override blocklist matches —
# use for legitimate sites that share infra with trackers (e.g. specific
# subdomains of googleapis.com or amazonaws.com that you actually want).
# Same hosts-file format as blocklist sources.
[allowlist]
sources = []

[cache]
max_entries      = 50000
jitter_max_ms    = 5          # feature 12: FP-Radar timing-fingerprint defense
sweep_interval_s = 30

[uncloak]
max_depth = 8                 # RFC 1034 CNAME chain depth

[logging]
path           = "cloakdns-queries.jsonl"   # empty string disables query logging
async          = true
queue_size     = 8192
# Rotate the log when it crosses this many bytes. 0 disables rotation.
# Each rotation renames the current file to "<path>.YYYYMMDDTHHMMSSZ"
# and opens a fresh one.
max_size_bytes = 0
# When true, the "client" field in each JSON line is replaced with a
# stable FNV-1a hash prefixed with "hash:" — useful when query logs may
# leave the host or be aggregated for analytics.
redact_client  = false
