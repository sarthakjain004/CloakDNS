name: ECH

# Separate workflow because the OpenSSL 4.0 build is heavy (~5min from
# source even with -j) and only needed for the ECH-on path. The main CI
# (ci.yml) keeps using stock OpenSSL 3.x.
#
# Stages:
#   1. build OpenSSL 4.0 (cached across runs by tag)
#   2. build cloakdns -DCLOAKDNS_ECH=ON against it
#   3. run unit tests (covers tls / svcb / ech_bootstrap / config,
#      including the configure_ssl_for_connection GREASE/plain paths
#      and the EchConfig RMW + status-string contract)
#   4. LOCAL wire test against `openssl s_server` with a locally-
#      generated ECH key — runs on EVERY PR (no external network), so
#      a change that breaks ECH on the wire is caught pre-merge.
#   5. live wire test against defo.ie — gated on the `ci:live-net` PR
#      label so external-network flakiness doesn't break random PRs.
#      Belt-and-suspenders over stage 4 against a real CDN.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  OPENSSL_VERSION: openssl-4.0.0    # bumps here force the cache to refresh
  OPENSSL_PREFIX: /opt/openssl4

jobs:
  ech-build-and-test:
    name: Ubuntu / OpenSSL 4.0 / -DCLOAKDNS_ECH=ON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache OpenSSL 4.0 install
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: ${{ env.OPENSSL_PREFIX }}
          # Bump the suffix when build flags / patches change so we don't
          # serve a stale binary across format-incompatible CMake bumps.
          key: openssl-${{ env.OPENSSL_VERSION }}-ubuntu-latest-v1

      - name: Build OpenSSL 4.0 from source
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential perl
          curl -fsSL "https://www.openssl.org/source/${OPENSSL_VERSION}.tar.gz" -o openssl.tar.gz
          tar xf openssl.tar.gz
          cd "${OPENSSL_VERSION}"
          ./Configure --prefix="${OPENSSL_PREFIX}" --openssldir="${OPENSSL_PREFIX}/ssl" enable-ech no-tests linux-x86_64
          make -j"$(nproc)"
          sudo make install_sw

      - name: Install cloakdns build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-18

      - name: Configure cloakdns (ECH on)
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake -S . -B build-ech -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCLOAKDNS_ECH=ON \
            -DOPENSSL_ROOT_DIR="${OPENSSL_PREFIX}"

      - name: Build
        run: cmake --build build-ech -j

      - name: Unit tests
        env:
          LD_LIBRARY_PATH: ${{ env.OPENSSL_PREFIX }}/lib64:${{ env.OPENSSL_PREFIX }}/lib
        run: ctest --test-dir build-ech --output-on-failure

  ech-wire-local:
    name: Wire test / local openssl s_server / verify_ech.py
    runs-on: ubuntu-latest
    # No `if:` gate — this runs on every PR. It needs no external network:
    # an `openssl s_server` with a locally-generated ECH key stands in for
    # the upstream, and verify_ech.py captures the ClientHello cloakdns
    # sends to it. This is the every-PR safety net the defo.ie job (below)
    # can't be, since that one is label-gated for flakiness reasons.
    needs: ech-build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Restore OpenSSL 4.0
        uses: actions/cache@v4
        with:
          path: ${{ env.OPENSSL_PREFIX }}
          key: openssl-${{ env.OPENSSL_VERSION }}-ubuntu-latest-v1

      - name: Install build deps + tshark + dig
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-18 tshark dnsutils

      - name: Configure cloakdns
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake -S . -B build-ech -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCLOAKDNS_ECH=ON \
            -DOPENSSL_ROOT_DIR="${OPENSSL_PREFIX}"

      - name: Build
        run: cmake --build build-ech -j --target cloakdns

      - name: Generate a local ECH key + self-signed server cert
        id: ech-keys
        env:
          LD_LIBRARY_PATH: ${{ env.OPENSSL_PREFIX }}/lib64:${{ env.OPENSSL_PREFIX }}/lib
        run: |
          set -euxo pipefail
          OPENSSL="${OPENSSL_PREFIX}/bin/openssl"
          # The from-source OpenSSL 4.0 was installed with `make install_sw`,
          # which omits the default openssl.cnf — the `openssl req` and
          # `s_server` apps abort when they can't open it. Drop a minimal
          # config at the build's configured openssldir so every openssl4
          # invocation finds it by default (no OPENSSL_CONF juggling).
          sudo mkdir -p "${OPENSSL_PREFIX}/ssl"
          printf '[req]\ndistinguished_name = dn\n[dn]\n' \
            | sudo tee "${OPENSSL_PREFIX}/ssl/openssl.cnf" >/dev/null
          # ECHConfigList + private key. `openssl ech` is the OpenSSL 4.0
          # subcommand (HISTORY: added in 4.0); -public_name is the decoy
          # outer SNI the client sends in cleartext.
          "${OPENSSL}" ech -public_name cover.local -out echconfig.pem
          echo "----- echconfig.pem -----"
          cat echconfig.pem
          # Extract the base64 ECHConfigList between the PEM markers — this
          # is exactly what cloakdns wants for ech_config_list_b64.
          ECH_B64="$(awk '/-----BEGIN ECHCONFIG-----/{f=1;next}/-----END ECHCONFIG-----/{f=0}f' echconfig.pem | tr -d '\n')"
          if [ -z "${ECH_B64}" ]; then
            echo "could not extract ECHCONFIG from echconfig.pem" >&2
            exit 1
          fi
          echo "ech_b64=${ECH_B64}" >> "${GITHUB_OUTPUT}"
          # Self-signed leaf for the inner name. cloakdns will reject the
          # chain (untrusted), but the ClientHello — the thing we assert on
          # — is already on the wire by the time cert verification runs.
          "${OPENSSL}" req -x509 -newkey rsa:2048 -nodes -days 1 \
            -keyout server-key.pem -out server-cert.pem \
            -subj "/CN=upstream.local"

      - name: Start openssl s_server with ECH, run local wire test
        id: wire-test
        env:
          LD_LIBRARY_PATH: ${{ env.OPENSSL_PREFIX }}/lib64:${{ env.OPENSSL_PREFIX }}/lib
          ECH_B64: ${{ steps.ech-keys.outputs.ech_b64 }}
        run: |
          set -euxo pipefail
          OPENSSL="${OPENSSL_PREFIX}/bin/openssl"
          # Raw-TLS DoT-style upstream on 853 (privileged → sudo). -ech_key
          # loads the matching ECH private key so the server can decrypt the
          # inner ClientHello. -quiet keeps it from blocking on stdin.
          # NB: `sudo --preserve-env=LD_LIBRARY_PATH` does NOT actually keep
          # LD_LIBRARY_PATH (sudo strips LD_* for security), and the openssl4
          # binary has no RPATH — so set it via `env` AFTER sudo instead.
          sudo env LD_LIBRARY_PATH="${LD_LIBRARY_PATH}" "${OPENSSL}" s_server \
            -accept 853 -naccept 10 \
            -cert server-cert.pem -key server-key.pem \
            -ech_key echconfig.pem -quiet &
          SERVER_PID=$!
          sleep 1
          sudo env LD_LIBRARY_PATH="${LD_LIBRARY_PATH}" python3 tools/e2e/verify_ech.py \
            --cloakdns build-ech/cloakdns \
            --upstream upstream.local \
            --upstream-ip 127.0.0.1 \
            --ech-outer cover.local \
            --ech-config-b64 "${ECH_B64}" \
            --protocol dot \
            --interface any \
            --keep-tmp
          sudo kill "${SERVER_PID}" 2>/dev/null || true

      - name: Dump verify_ech workdir on failure
        if: failure() && steps.wire-test.outcome == 'failure'
        run: |
          echo "::group::verify_ech workdirs"
          for d in /tmp/cloakdns-ech-*; do
            [ -d "$d" ] || continue
            echo "=== $d ==="
            sudo ls -la "$d" || true
            for f in "$d"/cloakdns.log "$d"/tshark.log; do
              [ -f "$f" ] || continue
              echo "--- $f ---"
              sudo cat "$f" || true
            done
          done
          echo "::endgroup::"

  ech-wire-defo:
    name: Wire test / defo.ie / verify_ech.py
    runs-on: ubuntu-latest
    # Live-network test. Gate on the `ci:live-net` PR label so a defo.ie
    # outage doesn't fail unrelated PRs. Always runs on push to main.
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:live-net')
    needs: ech-build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Restore OpenSSL 4.0
        uses: actions/cache@v4
        with:
          path: ${{ env.OPENSSL_PREFIX }}
          key: openssl-${{ env.OPENSSL_VERSION }}-ubuntu-latest-v1

      - name: Install build deps + tshark + dig
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-18 tshark dnsutils
          # tshark on Linux runs as root in CI; no setcap dance needed.

      - name: Configure cloakdns
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake -S . -B build-ech -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCLOAKDNS_ECH=ON \
            -DOPENSSL_ROOT_DIR="${OPENSSL_PREFIX}"

      - name: Build
        run: cmake --build build-ech -j --target cloakdns

      - name: Live ECH wire test against defo.ie
        id: wire-test
        env:
          LD_LIBRARY_PATH: ${{ env.OPENSSL_PREFIX }}/lib64:${{ env.OPENSSL_PREFIX }}/lib
        run: |
          # `any` works on Linux — the host's network stack picks the
          # right interface. Avoids the Windows-style numeric tshark IDs.
          # --keep-tmp leaves the workdir behind so the on-failure step can
          # dump cloakdns.log / tshark.log into the GH Actions output.
          sudo --preserve-env=LD_LIBRARY_PATH python3 tools/e2e/verify_ech.py \
            --cloakdns build-ech/cloakdns \
            --upstream defo.ie \
            --upstream-ip 213.108.108.101 \
            --ech-outer cover.defo.ie \
            --protocol doh \
            --interface any \
            --keep-tmp

      - name: Dump verify_ech workdir on failure
        if: failure() && steps.wire-test.outcome == 'failure'
        run: |
          echo "::group::verify_ech workdirs"
          for d in /tmp/cloakdns-ech-*; do
            [ -d "$d" ] || continue
            echo "=== $d ==="
            sudo ls -la "$d" || true
            for f in "$d"/cloakdns.log "$d"/tshark.log; do
              [ -f "$f" ] || continue
              echo "--- $f ---"
              sudo cat "$f" || true
            done
          done
          echo "::endgroup::"
