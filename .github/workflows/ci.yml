name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ubuntu-asan-ubsan:
    name: Ubuntu / Clang / ASan+UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-18

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCLOAKDNS_SANITIZE=asan+ubsan

      - name: Build
        run: cmake --build build -j

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build --output-on-failure

  ubuntu-tsan:
    name: Ubuntu / Clang / TSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-18

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake -S . -B build-tsan -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCLOAKDNS_SANITIZE=tsan

      - name: Build
        run: cmake --build build-tsan -j

      - name: Test
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        run: ctest --test-dir build-tsan --output-on-failure

  macos-asan-ubsan:
    # Apple Clang + libc++ on macos-latest. Sanity-checks that the
    # codebase actually builds on a non-Linux POSIX target. ASan+UBSan
    # only — TSan on macOS is occasionally flaky in CI and the Linux
    # TSan job already covers our concurrency surface (cache, hot-reload
    # atomics, async logger queue).
    name: macOS / Apple Clang / ASan+UBSan
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ninja
        run: brew install ninja

      # Apple libc++ gates std::jthread / std::stop_token behind
      # _LIBCPP_AVAILABILITY_SYNC (macOS 13.4+). Pin the deployment
      # target explicitly so the symbols are visible.
      - name: Configure
        env:
          MACOSX_DEPLOYMENT_TARGET: '14.0'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCLOAKDNS_SANITIZE=asan+ubsan

      - name: Build
        run: cmake --build build -j

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build --output-on-failure

  windows-msvc:
    name: Windows / MSVC
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release -j

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  python-updater-tests:
    name: update_blocklists.py unittest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unittest
        working-directory: tools
        run: python -m unittest test_update_blocklists -v

  fuzz-smoke:
    name: libFuzzer / DNS parser smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18

      - name: Configure asio fetch (for include path)
        run: |
          cmake -S . -B build-fetch -DCMAKE_BUILD_TYPE=Release
          # We only need the fetched asio sources; bail before building.

      - name: Build fuzz harness
        run: |
          clang++-18 -std=c++20 -O1 -g \
            -fsanitize=fuzzer,address,undefined \
            -Iinclude \
            -Ibuild-fetch/_deps/asio-src/asio/include \
            -DASIO_STANDALONE \
            tests/fuzz/fuzz_dns_parser.cpp \
            src/dns_parser.cpp \
            -o fuzz_parser

      - name: Run fuzzer (60s smoke)
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
        run: |
          mkdir -p fuzz-corpus
          ./fuzz_parser fuzz-corpus -max_total_time=60
